[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "usrcp-hermes"
version = "0.1.0"
description = "USRCP memory provider plugin for Hermes Agent"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = [
    "mcp>=1.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
]

[tool.hatch.build.targets.wheel]
packages = ["usrcp_hermes"]
include = ["usrcp_hermes/plugin.yaml"]

[tool.pytest.ini_options]
testpaths = ["tests"]
